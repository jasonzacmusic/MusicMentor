            "@type": "Answer",
            "text": "Chord Trees is a free interactive web application for visualizing chord progressions and learning music theory. It displays chords as beautiful tree diagrams, plays authentic instrument sounds (piano, guitar, strings, brass), and helps musicians of all levels understand harmony through visual and auditory learning."

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Select notes using the random generator or manual mode, then click on chord buttons to see and hear how chords are built. Enable the piano keyboard view to see note positions and inversions. Use the arpeggio loop feature to train your ear to recognize chord sounds."

        },
        {
          "@type": "Question",
          "name": "Does Chord Trees show guitar chord fingerings?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! In intermediate mode, enable the guitar fretboard view to see chord fingering diagrams. Chord Trees includes Open, Barre, and Alternative voicings for all 12 keys and 9 chord types (major, minor, diminished, augmented, major7, minor7, dominant7, sus2, sus4)."
          }
        },
        {
          "@type": "Question",
          "name": "What instruments are available in Chord Trees?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Chord Trees offers 5 instrument combos: Orchestral Piano (strings + grand piano), Brass & Guitar (brass pads + nylon guitar), Rock Organ (organ + electric guitar), 80's Synth (warm pads + synth lead), and Harp & Marimba (orchestral harp + vibraphone)."
          }
